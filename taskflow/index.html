<!-- FINIQUITO MODAL -->
<div class="modal-overlay" id="finiquito-modal">
<div class="modal" style="max-width:640px;max-height:90vh;overflow-y:auto;">
<div class="modal-header">
<h3 id="fq-modal-title">Nuevo finiquito / liquidación</h3>
<button class="btn btn-ghost btn-icon" onclick="closeFiniquitoModal()">✕</button>
</div>
<div class="modal-body">
<!-- TIPO -->
<div class="form-group">
<label class="form-label">Tipo de separación *</label>
<select class="form-select" id="fq-tipo" onchange="actualizarCalculo()">
<option value="renuncia_voluntaria">Renuncia voluntaria</option>
<option value="despido_justificado">Despido justificado</option>
<option value="despido_injustificado">Despido injustificado (liquidación)</option>
<option value="mutuo_acuerdo">Mutuo acuerdo</option>
</select>
</div>
<!-- TRABAJADOR -->
<div class="fq-section-label">Datos del trabajador</div>
<div class="form-row">
<div class="form-group">
<label class="form-label">Nombre completo *</label>
<input type="text" class="form-input" id="fq-trabajador" placeholder="Nombre del trabajador" oninput="actualizarCalculo()">
</div>
<div class="form-group">
<label class="form-label">RFC / CURP</label>
<input type="text" class="form-input" id="fq-trabajador-rfc" placeholder="RFC: XXXX000000XXX">
</div>
</div>
<!-- PATRÓN -->
<div class="fq-section-label">Datos del patrón</div>
<div class="form-row">
<div class="form-group">
<label class="form-label">Nombre / Razón social *</label>
<input type="text" class="form-input" id="fq-patron" placeholder="Nombre del patrón o empresa" oninput="actualizarCalculo()">
</div>
<div class="form-group">
<label class="form-label">RFC</label>
<input type="text" class="form-input" id="fq-patron-rfc" placeholder="XXXX000000XXX">
</div>
</div>
<!-- FECHAS Y SALARIO -->
<div class="fq-section-label">Datos laborales</div>
<div class="form-row">
<div class="form-group">
<label class="form-label">Fecha de ingreso *</label>
<input type="date" class="form-input" id="fq-ingreso" onchange="actualizarCalculo()">
</div>
<div class="form-group">
<label class="form-label">Fecha de baja *</label>
<input type="date" class="form-input" id="fq-baja" onchange="actualizarCalculo()">
</div>
</div>
<div class="form-row">
<div class="form-group">
<label class="form-label">Salario diario ordinario *</label>
<div class="amount-input-wrap">
<span class="amount-prefix">$</span>
<input type="number" class="form-input" id="fq-salario" placeholder="0.00" min="0" step="0.01" oninput="actualizarCalculo()">
</div>
</div>
<div class="form-group">
<label class="form-label">Días sin pagar</label>
<input type="number" class="form-input" id="fq-dias-no-pagados" placeholder="0" min="0" value="0" oninput="actualizarCalculo()">
</div>
</div>
<!-- PRESTACIONES ANTERIORES -->
<div class="form-group">
<div class="form-toggle" onclick="toggleFqPrestAnt()">
<div class="toggle-switch" id="toggle-fq-prest-ant"><div class="toggle-knob"></div></div>
<span class="toggle-label">Prestaciones de ejercicios anteriores pendientes</span>
</div>
<small class="form-hint">Si NO se pagaron aguinaldo/vacaciones de años anteriores, activa esta opción</small>
</div>
<div id="fq-prest-ant-section" style="display:none;">
<div class="form-group">
<label class="form-label" style="font-size:13px;color:var(--text2);">Selecciona los años pendientes:</label>
<div style="display:flex;flex-wrap:wrap;gap:15px;margin:10px 0;">
<label style="display:flex;align-items:center;gap:6px;cursor:pointer;">
<input type="checkbox" class="fq-anio-check" value="2024" onchange="actualizarCalculo()">
<span style="font-size:13px;">2024</span>
</label>
<label style="display:flex;align-items:center;gap:6px;cursor:pointer;">
<input type="checkbox" class="fq-anio-check" value="2025" onchange="actualizarCalculo()">
<span style="font-size:13px;">2025</span>
</label>
<label style="display:flex;align-items:center;gap:6px;cursor:pointer;">
<input type="checkbox" class="fq-anio-check" value="otro" onchange="toggleFqMontoOtro()">
<span style="font-size:13px;">Otro</span>
</label>
</div>
</div>
<div id="fq-monto-otro-section" style="display:none;">
<div class="form-group">
<label class="form-label">Monto de otros conceptos pendientes</label>
<div class="amount-input-wrap">
<span class="amount-prefix">$</span>
<input type="number" class="form-input" id="fq-monto-otro" placeholder="0.00" min="0" step="0.01" oninput="actualizarCalculo()">
</div>
</div>
</div>
</div>
<div class="divider"></div>
<!-- PREVIEW CÁLCULO -->
<div class="fq-section-label">Vista previa del cálculo</div>
<div id="fq-preview" class="fq-preview-box">
<p style="color:var(--text3);font-size:13px;text-align:center;padding:20px;">Completa los datos para ver el cálculo</p>
</div>
<div class="divider"></div>
<!-- DATOS PDF -->
<div class="fq-section-label">Datos para el PDF</div>
<div class="form-row">
<div class="form-group">
<label class="form-label">Ciudad</label>
<input type="text" class="form-input" id="fq-ciudad" value="Toluca">
</div>
<div class="form-group">
<label class="form-label">Estado</label>
<input type="text" class="form-input" id="fq-estado" value="Estado de México">
</div>
</div>
<div class="form-group">
<label class="form-label">Notas internas</label>
<textarea class="form-textarea" id="fq-notas" placeholder="Notas que no aparecen en el PDF..." style="min-height:50px;"></textarea>
</div>
</div>
<div class="modal-footer">
<button class="btn btn-secondary" onclick="closeFiniquitoModal()">Cancelar</button>
<button class="btn btn-primary" onclick="saveFiniquito()">💾 Guardar y descargar PDF</button>
</div>
</div>
</div>
